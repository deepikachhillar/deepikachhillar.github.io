- name: Leading High Performance Organizations
  id: BA 2100
  website: https://bulletin.du.edu/undergraduate/coursedescriptions/mgmt/
  description: In MGMT 2100 you learn the essentials of organizational behavior and acquire a toolkit of evidence-based people skills that complement the technical skills you gain in other DCB core courses.

- name: Strategic Human Resource Management
  id: BADM 313
  website: https://giesbusiness.illinois.edu/course/BADM/313
  description: The purpose of this course is to provide a deep introduction to HR and help students recognize its importance within the organization as a whole. The class will highlight the strategic dimensions of HR and approach it from more of a general management perspective. HR is especially important in knowledge-based organizations, where people are the primary resource that organizations derive value from. Managing people well is critical for modern organizations to succeed. This course will also delve into HR’s role in analyzing and addressing organizational inequalities and diversity and inclusion (D&I). This course incorporates current events and case studies to highlight contemporary examples of HR processes and their consequences. Furthermore, people analytics (the combination of HR questions with data science methods) are addressed throughout the semester. 
  
